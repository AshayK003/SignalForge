# SignalForge Configuration
# Default values — override with .env or environment variables

app:
  name: SignalForge
  version: 0.1.0
  data_dir: ./data

chunking:
  max_chunk_size: 3000
  overlap: 300

transcription:
  model: tiny
  device: auto
  compute_type: float32

report:
  max_sources_per_report: 50
  output_formats:
    - pdf
    - markdown

deps:
  # Override paths to yt-dlp/FFmpeg/Tesseract/Poppler if auto-detection fails.
  # Leave empty to use built-in defaults.
  deno_path: ""
  ffmpeg_path: ""
  tesseract_cmd: ""
  poppler_bin: ""

logging:
  level: INFO
  file: ./data/signalforge.log
